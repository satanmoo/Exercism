name: Auto merge Exercism Solutions Syncer PRs

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  pull_request_review:
    types: [submitted]
  check_suite:
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Merge eligible PR(s)
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            async function tryMerge(pull_number) {
              const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number });

              if (pr.user.login !== 'exercism-solutions-syncer[bot]') {
                core.info(`#${pull_number} skip: author=${pr.user.login}`);
                return;
              }
              if (pr.draft) {
                core.info(`#${pull_number} skip: draft`);
                return;
              }
              if (!['clean', 'unstable'].includes(pr.mergeable_state)) {
                core.info(`#${pull_number} skip: mergeable_state=${pr.mergeable_state}`);
                return;
              }

              try {
                await github.rest.pulls.merge({
                  owner,
                  repo,
                  pull_number,
                  merge_method: 'squash'
                });
                core.info(`#${pull_number} merged`);
              } catch (e) {
                core.warning(`#${pull_number} merge failed: ${e.message}`);
              }
            }

            let numbers = [];

            if (context.eventName === 'pull_request' || context.eventName === 'pull_request_review') {
              const n = context.payload.pull_request?.number;
              if (n) numbers.push(n);
            } else if (context.eventName === 'check_suite') {
              const prs = context.payload.check_suite?.pull_requests ?? [];
              if (prs.length > 0) numbers.push(prs[0].number);
            } else if (context.eventName === 'workflow_dispatch') {
              const prs = await github.paginate(github.rest.pulls.list, {
                owner,
                repo,
                state: 'open',
                per_page: 100
              });
              numbers = prs
                .filter(pr => pr.user.login === 'exercism-solutions-syncer[bot]')
                .map(pr => pr.number);
            }

            numbers = [...new Set(numbers)];
            core.info(`target PRs: ${numbers.join(', ') || '(none)'}`);

            for (const n of numbers) {
              await tryMerge(n);
            }
